{% extends "base.html" %}
{% block title %}DevForge — Register{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">⌬</div>
      DevForge
    </div>
    <div class="auth-title">Create your workspace</div>
    <div class="auth-sub">Start managing your projects today</div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="johndoe" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="Strong password" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm</label>
          <input type="password" name="confirm_password" class="form-input" placeholder="Repeat password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Create Account →</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in →</a></div>
  </div>
</div>
{% endblock %}
